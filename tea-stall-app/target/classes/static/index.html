<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tea Stall Billing</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<header class="header">
  <div class="header-left">
    <span class="logo">🍵</span>
    <div>
      <h1>Sae's Tea Center</h1>
      <p class="tagline">Billing System</p>
    </div>
  </div>
  <nav class="nav-tabs">
    <button class="nav-btn active" onclick="showTab('billing')">🧾 Billing</button>
    <button class="nav-btn" onclick="showTab('orders')">📋 Orders</button>
    <button class="nav-btn" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="showTab('menu')">🍽️ Menu</button>
  </nav>
</header>

<!-- BILLING TAB -->
<div id="tab-billing" class="tab-content active">
  <div class="billing-grid">
    <div class="panel">
      <div class="panel-header">
        <h2>Menu</h2>
        <div class="search-box">
          <input type="text" id="menuSearch" placeholder="Search item..." oninput="filterMenu()"/>
        </div>
      </div>
      <div class="cat-tabs" id="catTabs"></div>
      <div class="menu-grid" id="menuGrid">
        <div class="loading">Loading menu...</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <h2>Current Bill</h2>
        <span class="badge" id="cartCount">0 items</span>
      </div>
      <div class="bill-meta">
        <input type="text" id="tableNo" placeholder="Table / Name (e.g. Table 3)" class="meta-input"/>
      </div>
      <div id="cartList" class="cart-list">
        <div class="empty-state">Tap items from the menu to add</div>
      </div>
      <div class="bill-footer">
        <div class="discount-row">
          <label>Discount %</label>
          <input type="number" id="discountPct" value="0" min="0" max="100" oninput="updateSummary()"/>
        </div>
        <div class="summary">
          <div class="sum-row"><span>Subtotal</span><span id="sumSubtotal">₹0.00</span></div>
          <div class="sum-row disc-row" id="discRow" style="display:none"><span id="discLabel">Discount</span><span id="sumDiscount">-₹0.00</span></div>
          <div class="sum-row tax-row"><span>GST (5%)</span><span id="sumTax">₹0.00</span></div>
          <div class="sum-row total-row"><span>Total</span><span id="sumTotal">₹0.00</span></div>
        </div>
        <div class="bill-actions">
          <button class="btn btn-danger" onclick="clearCart()">Clear</button>
          <button class="btn btn-secondary" onclick="saveDraft()">Save Draft</button>
          <button class="btn btn-primary" onclick="submitOrder()">Print Bill</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ORDERS TAB -->
<div id="tab-orders" class="tab-content">
  <div class="panel full-panel">
    <div class="panel-header">
      <h2>Orders</h2>
      <div class="filter-row">
        <select id="orderFilter" onchange="loadOrders()">
          <option value="today">Today</option>
          <option value="open">Open</option>
          <option value="all">All</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="loadOrders()">Refresh</button>
      </div>
    </div>
    <div id="ordersTable" class="orders-table-wrap">
      <div class="loading">Loading orders...</div>
    </div>
  </div>
</div>

<!-- DASHBOARD TAB -->
<div id="tab-dashboard" class="tab-content">
  <div class="panel full-panel">
    <div class="panel-header">
      <h2>Today's Summary</h2>
      <button class="btn btn-secondary btn-sm" onclick="loadDashboard()">Refresh</button>
    </div>
    <div class="metrics-grid" id="metricsGrid">
      <div class="loading">Loading...</div>
    </div>
    <h3 class="section-title">Recent Orders</h3>
    <div id="recentOrders" class="orders-table-wrap"></div>
  </div>
</div>

<!-- MENU MANAGEMENT TAB -->
<div id="tab-menu" class="tab-content">
  <div class="panel full-panel">
    <div class="panel-header">
      <h2>Menu Management</h2>
      <button class="btn btn-primary btn-sm" onclick="openAddItemModal()">+ Add Item</button>
    </div>
    <div id="menuMgmtTable" class="orders-table-wrap">
      <div class="loading">Loading menu...</div>
    </div>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div id="receiptModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="receipt" id="receiptContent"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('receiptModal')">Close</button>
      <button class="btn btn-primary" onclick="printReceipt()">Print</button>
      <button class="btn btn-success" onclick="newBill()">New Bill</button>
    </div>
  </div>
</div>

<!-- ADD ITEM MODAL -->
<div id="addItemModal" class="modal-overlay" style="display:none">
  <div class="modal modal-sm">
    <h3>Add Menu Item</h3>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="newItemName" placeholder="e.g. Masala Chai"/>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="newItemCategory">
        <option>Tea</option><option>Coffee</option><option>Snacks</option><option>Cold</option><option>Other</option>
      </select>
    </div>
    <div class="form-group">
      <label>Price (₹)</label>
      <input type="number" id="newItemPrice" placeholder="15" min="1"/>
    </div>
    <div class="form-group">
      <label>Icon (emoji)</label>
      <input type="text" id="newItemIcon" placeholder="🍵" maxlength="2"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('addItemModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addMenuItem()">Add Item</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
